name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 3. Install requirements
        run: |
          Write-Host "=== Installing requirements ==="
          pip install -r requirements.txt
          Write-Host "=== Requirements installed ==="

      - name: 4. Check files exist
        run: |
          Write-Host "=== Checking required files ==="
          ls 7z.exe
          ls credentials.json
          Write-Host "=== Files OK ==="

      - name: 5. Build with PyInstaller
        run: |
          Write-Host "=== Starting PyInstaller build ==="
          pyinstaller `
            --clean `
            --noconfirm `
            --windowed `
            --name "AutoDriveDESI" `
            --add-data "7z.exe;." `
            --add-data "credentials.json;." `
            --collect-all customtkinter `
            main_app.py
          Write-Host "=== PyInstaller finished ==="

      - name: 6. Upload artifact (if success)
        uses: actions/upload-artifact@v4
        with:
          name: AutoDriveDESI-Windows
          path: dist/AutoDriveDESI/
